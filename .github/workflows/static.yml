name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Dùng thẳng bản 24 để hết báo deprecated

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx ng build --configuration production --base-href /vtp_qlda_fe/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Thử để path rộng hơn nếu bạn không chắc chắn
          path: ./dist/vtp_qlda_fe/browser
name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"] # Chạy mỗi khi bạn push code lên branch main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Hoặc version bạn đang dùng

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base-href /vtp_qlda_fe/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chú ý: path này phải khớp với thư mục output trong angular.json (thường là dist/tên-project)
          path: ./dist/vtp_qlda_fe/browser 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      # Loại bỏ hoàn toàn cảnh báo Node.js 20 deprecated
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        # Giữ nguyên base-href theo tên Repository của bạn trên GitHub
        run: npx ng build --configuration production --base-href /vtp_qlda_fe/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ĐÃ SỬA: Theo đúng log build thực tế của bạn báo ra là 'dist/vss'
          path: ./dist/vss

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Sử dụng bản LTS ổn định nhất hiện tại

      - name: Install dependencies
        run: npm install --legacy-peer-deps # Thêm flag này để tránh lỗi xung đột thư viện

      - name: Build
        # Thay vtp_qlda_fe bằng tên repo chính xác của bạn nếu có khác biệt
        run: npx ng build --configuration production --base-href /vtp_qlda_fe/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Kiểm tra kỹ: Angular 17+ thường là dist/[project-name]/browser
          # Nếu lỗi 'Path not found', hãy thử đổi thành ./dist/vtp_qlda_fe
          path: ./dist/vtp_qlda_fe/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
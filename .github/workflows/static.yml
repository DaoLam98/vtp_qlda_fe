name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Khử hoàn toàn cảnh báo Node.js bạn đang gặp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Khớp với môi trường mới nhất của GitHub

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        # Lưu ý: Đảm bảo vtp_qlda_fe đúng là tên Repository của bạn
        run: npx ng build --configuration production --base-href /vtp_qlda_fe/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # THỬ NGHIỆM: Nếu vẫn lỗi, bạn hãy thử đổi đường dẫn bên dưới
          # xóa chữ /browser nếu bạn dùng bản Angular cũ
          path: ./dist/vtp_qlda_fe/browser

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
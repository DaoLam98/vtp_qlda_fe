<div class="dashboard-container">
  <!-- Header Menu -->
  <div class="header-menu" fxLayout="row wrap">
    @for (module of modules; track $index) {
      <div
        class="padding-5 full-width"
        fxLayout="column"
        fxFlex="25%"
        fxFlex.xs="100%"
        fxFlex.sm="50%"
        fxFlex.md="50%"
        fxFlex.lg="25%"
      >
        <mat-card class="menu-card" [routerLink]="module.path" [style.background-color]="module.color">
          @if (module.img) {
            <img [src]="module.img" alt="" width="24" height="24"/>
          }
          <span>{{ module.name }}</span>
        </mat-card>
      </div>
    }
  </div>

  <div class="main-content">
    <!-- Sidebar (Danh sách công việc) -->
    <div class="sidebar">
      <mat-form-field appearance="outline" class="search-box">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput placeholder="Nhập tên công việc">
      </mat-form-field>

      <mat-tab-group>
        <mat-tab label="Công việc chờ xử lý">
          <ng-container *ngFor="let group of tasks">
            <div style="margin-top: 8px;"></div>
            <mat-accordion>
              <mat-expansion-panel>
                <mat-expansion-panel-header>
                  <mat-panel-title> {{ group.category }}<span class="task-count">{{ group.count }}</span>
                  </mat-panel-title>
                </mat-expansion-panel-header>
                <ng-container *ngFor="let item of group.items, index as i">
                  <div [routerLink]="item.url" class="task">
                    <b>{{ i + 1 }}. {{ item.title }}</b><br>
                    <p><span style="opacity: 0;">{{ i + 1 }}.</span> {{ item.description }}</p>
                    <hr>
                  </div>
                </ng-container>
              </mat-expansion-panel>
            </mat-accordion>
          </ng-container>
        </mat-tab>
        <mat-tab label="Công việc cần hoàn thành"></mat-tab>
      </mat-tab-group>
    </div>

    <!-- Charts Section -->
    <div class="charts">
      <div class="chart-container">
        <canvas #lineChart></canvas>
      </div>
      <div class="chart-container">
        <canvas #barChart></canvas>
      </div>
      <div class="chart-container">
        <canvas #groupBarChart></canvas>
      </div>
      <div class="chart-container">
        <canvas #pieChart></canvas>
      </div>
    </div>
  </div>
</div>

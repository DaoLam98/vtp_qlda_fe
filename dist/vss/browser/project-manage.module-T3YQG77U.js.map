<cva-breadcrumb></cva-breadcrumb>
<div fxLayout="row wrap" class="row-wrap-padding edit-action"></div>
<form [formGroup]="addEditForm" class="form edit-form" style="padding-bottom: 50px">
  <div class="content" style="padding: 24px 14px">
    <mat-tab-group #tabGroup class="tab-flex-grow-0">
      <mat-tab label="{{ 'project.project-evaluation.general' | translate }}">
        <app-project-evaluation-general [addEditForm]="addEditForm"></app-project-evaluation-general>
      </mat-tab>
      <mat-tab label="{{ 'project.project-evaluation.investment' | translate }}">
        <ng-template matTabContent>
          <app-project-evaluation-investment
            [addEditForm]="addEditForm"
            [accountingAccountValues]="accountingAccountValues"
            [assetValues]="assetValues"
            [targetValues]="targetValues"
          ></app-project-evaluation-investment>
        </ng-template>
      </mat-tab>
      <mat-tab label="{{ 'project.project-evaluation.impl-status' | translate }}">
        <app-project-evaluation-impl-status
          [model]="model"
          [addEditForm]="addEditForm"
          (onExpressionChange)="getDetail()"
        ></app-project-evaluation-impl-status>
      </mat-tab>
      <mat-tab label="{{ 'project.project-evaluation.effectiveness' | translate }}">
        <app-project-evaluation-effectiveness
          [model]="model"
          [addEditForm]="addEditForm"
          (onExpressionChange)="getDetail()">
        </app-project-evaluation-effectiveness>
      </mat-tab>
    </mat-tab-group>
  </div>
</form>
<div class="row-wrap-padding edit-action-bottom">
  <div class="btn-sec">
    <button
      mat-stroked-button
      type="button"
      class="primary outline"
      (click)="back()">
      <i class="fa fa-arrow-left"></i> {{ 'btnBack' | translate }}
    </button>
    <button
      *ngIf="!isView"
      [disabled]="this.addEditForm.invalid"
      mat-button
      type="button"
      class="primary"
      (click)="onSave()">
      <i class="fa fa-save"></i> {{ 'btnSave' | translate }}
    </button>
    <button
      *ngIf="isView"
      mat-button
      type="button"
      class="primary"
      (click)="onEdit(this.model?.id)">{{ 'btnUpdate' | translate }}
    </button>
    <button
      *ngIf="isView || tabGroup.selectedIndex != 3"
      mat-button
      type="button"
      class="primary"
      (click)="onSubmit('SAVE_AND_NEXT_VO')"
    >
      {{ 'btnSaveAndSwitchSign' | translate }}
    </button>
  </div>
</div>

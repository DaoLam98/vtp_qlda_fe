<cva-breadcrumb></cva-breadcrumb>
<div fxLayout="row wrap" fxLayoutGap="20px" class="cycle-management margin-top-10">
  <div fxLayout="column" fxFlex="calc(77% - 20px)">
    <cloud-search
      #cloudSearchRef
      [configForm]="configForm"
      [columns]="columns"
      [buttons]="buttons"
      [formAdvanceSearch]="formAdvanceSearch"
      [isShowBreadcrum]="false"
      [addBtnEnabled]="hasAddPermission"
      [exportBtnEnabled]="false"
      [addBtnFunction]="addBtnFunction"
      [convertField2HttpParamFn]="convertField2HttpParamFn.bind(this)"
    >

      <ng-template appTemplate="filterForm">
        <div fxLayout="row wrap" class="row-wrap-padding" [formGroup]="formAdvanceSearch">
          <cva-multi-select-autocomplete
            name="projectId"
            formControlName="projectId"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'projectId')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'project')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]="projectValues"
            [multiple]="false"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-multi-select-autocomplete>

          <cva-multi-select-autocomplete
            name="informationTypeId"
            formControlName="informationTypeId"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'informationTypeId')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'dataType')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]="dataTypeValues"
            [multiple]="false"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-multi-select-autocomplete>

          <cva-multi-select-autocomplete
            name="targetGroups.targetGroupId"
            formControlName="targetGroups.targetGroupId"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'targetGroups.targetGroupId')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'targetGroup')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]="targetGroupValues"
            [multiple]="false"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-multi-select-autocomplete>

          <cva-multi-select-autocomplete
            name="cycleId"
            formControlName="cycleId"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'cycleId')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'period')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]="periodValues"
            [multiple]="false"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-multi-select-autocomplete>
        </div>
      </ng-template>
    </cloud-search>
  </div>
</div>

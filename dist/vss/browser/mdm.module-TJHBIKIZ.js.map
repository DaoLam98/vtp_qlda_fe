<div fxLayout='row wrap' style="justify-content: space-between; align-items: center">
  <cva-breadcrumb style="flex: 1"></cva-breadcrumb>

  <div fxLayout='row wrap' class='vertical-divider'>
    <div class='btn-sec' style="display: flex; gap: 11px; margin-left: 33px;">
      <!-- Quay lại -->
      <button
        mat-button
        type='submit'
        class='outline'
        (click)='back()'
      >
        <i class="fas fa-arrow-left"></i> {{ 'btnBack'|translate }}
      </button>

      @if (isView) {
        <!-- Kích hoạt -->
        <button
          *ngIf="hasApprovePermission"
          mat-button
          type='submit'
          class='primary'
          [disabled]="checkIsActive"
          (click)='onUpdateStatus("approve")'
        >
          <i class='far fa-check-circle'></i> {{ 'btnActive'|translate }}
        </button>

        <!-- Hủy kích hoạt -->
        <button
          *ngIf="hasRejectPermission"
          mat-button
          type='submit'
          class='primary'
          [disabled]="!checkIsActive"
          (click)='onUpdateStatus("reject")'
        >
          <i class='fas fa-ban'></i> {{ 'btnInactive'|translate }}
        </button>
      }

      <!-- Nút Lưu -->
      <button
        *ngIf="!isView && (hasAddPermission || hasEditPermission)"
        mat-button
        type='submit'
        class='primary'
        [disabled]='addEditForm.invalid || isView'
        (click)='onSubmit()'
      >
        <i class='fa fa-save'></i> {{ 'btnAddEdit'|translate }}
      </button>

      <!-- Chỉnh sửa -->
      <button
        *ngIf="isView && hasEditPermission"
        mat-button
        type='submit'
        class='primary'
        (click)='onRedirect(this.model?.id)'
      >
        <i class='fas fa-pencil-alt'></i> {{ 'btnUpdate'|translate }}
      </button>
    </div>
  </div>
</div>

<form [formGroup]='addEditForm' class='form edit-form'>
  <!-- Thông tin chung -->
  <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header style="background-color: unset">
        <mat-panel-title> {{ moduleName + '.form.common.title' | translate }} </mat-panel-title>
      </mat-expansion-panel-header>

      <div style='margin: 0 -16px;'>
        <div class='fieldSetContent row-wrap-padding' fxLayout='row wrap'>
          <div fxLayout="row wrap" fxFlex="100%">
            <cva-radiobutton
              formControlName="type"
              [disabled]="isView"
              [options]="typeValues"
              (onChange)="onChangeType($event)"
              [direction]="'horizontal'"
              fxLayout="row"
              fxFlex="100%"
            >
            </cva-radiobutton>
          </div>

          <cva-input
            name='userName'
            formControlName='userName'
            [label]="moduleName+'.form.userName'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [maxLength]="255"
            [disabled]='isView || isEdit'
            [required]='!isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <cva-input
            name='code'
            formControlName='code'
            [label]="moduleName+'.form.code'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [maxLength]="10"
            [disabled]='isView'
            [required]='!isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <cva-input
            name='fullName'
            formControlName='fullName'
            [label]="moduleName+'.form.name'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [maxLength]="255"
            [disabled]='isView'
            [required]='!isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <cva-input
            name='phoneNumber'
            formControlName='phoneNumber'
            [label]="moduleName+'.form.phone'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [maxLength]="20"
            [disabled]='isView'
            [required]='!isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <cva-input
            name='email'
            formControlName='email'
            [label]="moduleName+'.form.email'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [maxLength]="1000"
            [disabled]='isView'
            [errorMessages]="inputErrorMsg"
            fxLayout='column'
            fxFlex='50%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='50%'
          >
          </cva-input>

          <cva-input
            name='description'
            formControlName='description'
            [label]="moduleName+'.form.description'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [maxLength]="255"
            [disabled]='isView'
            fxLayout='column'
            fxFlex='50%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='50%'
          >
          </cva-input>

          <app-organization-composit-choosen
            *ngIf="addEditForm.get('type')?.value === 'COLLABORATOR'"
            formControlName="organizationId"
            [listOrg]="orgOptions"
            [required]="addEditForm.get('type')?.value === 'COLLABORATOR' && !isView"
            [disabled]="isView"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          >
          </app-organization-composit-choosen>

          <cva-multi-select-autocomplete
            name='gender'
            formControlName='gender'
            [label]="moduleName+'.form.gender'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]='genderValue'
            [multiple]='false'
            [disabled]="isView"
            [required]='!isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-multi-select-autocomplete>

          <cva-date-picker
            formControlName="dob"
            [label]="moduleName + '.form.dob'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'DD/MM/YYYY'"
            [disabled]="isView"
            [maxDate]="today"
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-date-picker>

          @if(isView) {
            <!-- Trạng thái -->
            <cva-input
              name='status'
              formControlName='status'
              [label]="'common.table.header.status'"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              [disabled]="isView"
              fxLayout='column'
              fxFlex='25%'
              fxFlex.xs='100%'
              fxFlex.sm='50%'
              fxFlex.md='50%'
              fxFlex.lg='25%'
            >
            </cva-input>

            <!-- Người tạo -->
            <cva-input
              name='createdBy'
              formControlName='createdBy'
              [label]="'common.table.header.createdBy'"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              [disabled]='isView'
              fxLayout='column'
              fxFlex='25%'
              fxFlex.xs='100%'
              fxFlex.sm='50%'
              fxFlex.md='50%'
              fxFlex.lg='25%'
            >
            </cva-input>

            <!-- Ngày tạo -->
            <cva-input
              name='createdDate'
              formControlName='createdDate'
              [label]="'common.table.header.createdDate'"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              [disabled]='isView'
              fxLayout='column'
              fxFlex='25%'
              fxFlex.xs='100%'
              fxFlex.sm='50%'
              fxFlex.md='50%'
              fxFlex.lg='25%'
            >
            </cva-input>

            <!-- Người cập nhật -->
            <cva-input
              name='lastModifiedBy'
              formControlName='lastModifiedBy'
              [label]="'common.table.header.lastModifiedBy'"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              [disabled]='isView'
              fxLayout='column'
              fxFlex='25%'
              fxFlex.xs='100%'
              fxFlex.sm='50%'
              fxFlex.md='50%'
              fxFlex.lg='25%'
            >
            </cva-input>

            <!-- Ngày cập nhật -->
            <cva-input
              name='lastModifiedDate'
              formControlName='lastModifiedDate'
              [label]="'common.table.header.lastModifiedDate'"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              [disabled]='isView'
              fxLayout='column'
              fxFlex='25%'
              fxFlex.xs='100%'
              fxFlex.sm='50%'
              fxFlex.md='50%'
              fxFlex.lg='25%'
            >
            </cva-input>
          }
        </div>
      </div>
    </mat-expansion-panel>

  <div class="margin-vertical-15"></div>

  <!-- Danh sách vai trò -->
  <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header class="smart-table">
        <mat-panel-title>
          <div style="width: 100%; display: flex; justify-content: space-between; align-items: center !important;">
            <!-- Tiêu đề -->
            <div>
              {{ moduleName + '.form.table.title' | translate }}
              ({{ addEditForm.get("userRoles")?.value?.length || 0 }})
            </div>

            <!-- Thêm -->
            <button
              *ngIf="!isView && (hasAddPermission || hasEditPermission)"
              mat-button
              type="button"
              class="primary"
              (click)="$event.stopPropagation(); addRoleRow()"
              (keydown.enter)="$event.stopPropagation(); $event.preventDefault()"
              (keydown.space)="$event.stopPropagation(); $event.preventDefault()"
            >
              <i class="fa fa-plus"></i> {{ 'menu.mdm.external-user.form.table.add-btn' | translate }}
            </button>
          </div>
        </mat-panel-title>
      </mat-expansion-panel-header>

      <div fxLayout="column">
        <cva-smart-table
          *ngIf="addEditForm.get('userRoles')?.value?.length"
          formControlName="userRoles"
          [moduleName]="moduleName"
          [columns]="roleColumns"
          [buttons]="roleButtons"
          [isSticky]="true"
          (clickAction)="onRowButtonClick($event)"
          fxFlex="100%"
        ></cva-smart-table>
      </div>
    </mat-expansion-panel>
</form>

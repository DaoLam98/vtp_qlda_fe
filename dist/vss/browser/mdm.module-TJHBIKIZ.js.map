<div class="dialog_wrapper" style="width: 1000px">
  <div class="dialog_header">
    <div class="dialog_title">{{ 'common.mdm.create' | translate }}</div>
    <i class="fal fa-times margin-15" style="cursor: pointer" (click)="matDialogRef.close()"></i>
  </div>
  <div class="dialog_content">
    <form [formGroup]="addEditForm" class="form edit-form">
      <div>
        <fieldset>
          <div class="fieldSetContent row-wrap-padding" fxLayout="row wrap">
            <cva-input
              type="number"
              name="year"
              formControlName="year"
              [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'year')"
              [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'year')"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              [required]="true"
              [errorMessages]="errorMessages"
              fxLayout="column"
              fxFlex="100%"
              [appBlockChars]="['-', '.', 'e']"
              [appBlockMaxLength]="16"
              [patternFilter]="'^\\d{0,15}(\\.\\d*)?$'"
            ></cva-input>

            <cva-input
              name="format"
              formControlName="format"
              [disabled]="true"
              [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'format')"
              [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'format')"
              [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
              [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
              [placeholder]="'common.placeholder.input'"
              fxLayout="column"
              fxFlex="100%"
            ></cva-input>
          </div>
        </fieldset>
      </div>
    </form>
  </div>
  <div class="dialog_footer right">
    <div>
      <button mat-button class="primary outline" (click)="matDialogRef.close()">
        {{ 'common.btnClose' | translate }}
      </button>
      <button mat-button class="primary" [disabled]="addEditForm.invalid" (click)="onSubmit()">
        {{ 'common.btnAdd' | translate }}
      </button>
    </div>
  </div>
</div>

<cva-breadcrumb *ngIf="!isPopup" style="display: block; margin-bottom: 12px"></cva-breadcrumb>

<!-- Body -->
<div fxLayout="row wrap" fxLayoutGap="20px" class="user-tree">
  <cva-flat-tree
    name='organization'
    formControlName='organization'
    [label]=""
    [multiple]="false"
    [fullDatasource]='organizationTree'
    [isCollapseSelected]='false'
    [isSearchOutSide]='false'
    [isDisplayChooseTreeOnly]="true"
    (onNodeClick)="onChooseOrg($event)"
    [selectedLabelTitle]="moduleName+'.table.header.organization'"
    [viewHeight]="660"
    fxLayout='column'
    fxFlex='30%'
  >
  </cva-flat-tree>

  <div fxLayout='column' fxFlex="calc(70% - 20px)">
    <cloud-search
      #cloudSearchRef
      [configForm]="configForm"
      [columns]="columns"
      [buttons]="buttons"
      [isShowBreadcrum]="false"
      [formAdvanceSearch]="formAdvanceSearch"
      [addBtnEnabled]="hasAddPermission"
      [selected]="selectedEmployee"
      [trackBy]="trackBy"
      [convertField2HttpParamFn]="convertField2HttpParamFn.bind(this)"
    >
      <ng-template appTemplate="quickFilterForm">
        <div
          class="select-org-tree-container"
          style="display: flex;"
        >
          @if (selectedTreeNode?.displayValue) {
          <span class="select-org-tree-node-label">
            {{ 'common.targetPopupChosen.selectedTreeNode.label' | translate }}:
          </span>
            <span class="select-org-tree-node-name" [matTooltip]="selectedTreeNode?.displayValue">{{ selectedTreeNode?.displayValue }}</span>
          }
        </div>
      </ng-template>

      <ng-template appTemplate="filterForm">
        <div
          fxLayout="row wrap"
          class="row-wrap-padding"
          [formGroup]="formAdvanceSearch"
        >
          <cva-input
            name="code"
            formControlName="code"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'code')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'code')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-input>

          <cva-input
            name="name"
            formControlName="name"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'name')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'name')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-input>

          <cva-multi-select-autocomplete
            name="parentId"
            formControlName="parentId"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'parentId')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'targetParent')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]="targetParentValues"
            [multiple]="false"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-multi-select-autocomplete>

          <cva-multi-select-autocomplete
            name="targetGroupId"
            formControlName="targetGroupId"
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'targetGroupId')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'targetGroup')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [options]="targetGroupValues"
            [multiple]="false"
            fxLayout="column"
            fxFlex="25%"
            fxFlex.xs="100%"
            fxFlex.sm="50%"
            fxFlex.md="50%"
            fxFlex.lg="25%"
          ></cva-multi-select-autocomplete>

          <cva-multi-select-autocomplete
            name='status'
            formControlName='status'
            [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'status')"
            [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'status')"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.select'"
            [multiple]='false'
            [options]='statusValues$ | async'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          ></cva-multi-select-autocomplete>
        </div>
      </ng-template>
    </cloud-search>
  </div>
</div>

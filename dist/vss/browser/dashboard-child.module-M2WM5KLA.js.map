<form class='form edit-form' [formGroup]="filterForm">
  <div class="content" fxLayout fxLayoutGap="16px" style="padding: 40px 16px 24px 16px;">
    <cva-multi-select-autocomplete
      formControlName="projectTeam"
      [class]=""
      [label]="moduleName+'.table.header.assetValue'"
      [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
      [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
      [placeholder]="'common.placeholder.select'"
      [options]="optionsData"
      [multiple]='false'
      fxLayout='column'
      fxFlex='25%'
      fxFlex.xs='100%'
      fxFlex.sm='50%'
      fxFlex.md='50%'
      fxFlex.lg='25%'
    >
    </cva-multi-select-autocomplete>
    <cva-multi-select-autocomplete
      formControlName="project"
      [class]=""
      [label]="moduleName+'.table.header.assetValue'"
      [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
      [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
      [placeholder]="'common.placeholder.select'"
      [options]="optionsData"
      [multiple]='false'
      fxLayout='column'
      fxFlex='25%'
      fxFlex.xs='100%'
      fxFlex.sm='50%'
      fxFlex.md='50%'
      fxFlex.lg='25%'
    >
    </cva-multi-select-autocomplete>
    <cva-multi-select-autocomplete
      formControlName="Company"
      [class]=""
      [label]="moduleName+'.table.header.assetValue'"
      [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
      [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
      [placeholder]="'common.placeholder.select'"
      [options]="optionsData"
      [multiple]='false'
      fxLayout='column'
      fxFlex='25%'
      fxFlex.xs='100%'
      fxFlex.sm='50%'
      fxFlex.md='50%'
      fxFlex.lg='25%'
    >
    </cva-multi-select-autocomplete>
    <cva-multi-select-autocomplete
      formControlName="frequency"
      [class]=""
      [label]="moduleName+'.table.header.assetValue'"
      [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
      [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
      [placeholder]="'common.placeholder.select'"
      [options]="optionsData"
      [multiple]='false'
      fxLayout='column'
      fxFlex='25%'
      fxFlex.xs='100%'
      fxFlex.sm='50%'
      fxFlex.md='50%'
      fxFlex.lg='25%'
    >
    </cva-multi-select-autocomplete>
    <cva-date-picker
      formControlName="startDate"
      [label]="'common.table.header.createdDate'"
      [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
      [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
      [placeholder]="'common.placeholder.input'"
      [disabled]='false'
      fxLayout='column'
      fxFlex='25%'
      fxFlex.xs='100%'
      fxFlex.sm='50%'
      fxFlex.md='50%'
      fxFlex.lg='25%'
    >
    </cva-date-picker>
    <cva-date-picker
      formControlName="endDate"
      [label]="'common.table.header.createdDate'"
      [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
      [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
      [placeholder]="'common.placeholder.input'"
      [disabled]='false'
      fxLayout='column'
      fxFlex='25%'
      fxFlex.xs='100%'
      fxFlex.sm='50%'
      fxFlex.md='50%'
      fxFlex.lg='25%'
    >
    </cva-date-picker>
    <button
      (click)="onFilterApply()"
      mat-button
      type='submit'
      class='primary'
    >{{ 'btnFilter'|translate }}
    </button>
    <button
      (click)="onResetFilter()"
      mat-button
      type='submit'
      class='outline'
    >{{ 'btnReset'|translate }}
    </button>
  </div>
</form>
<div class="margin-bottom-15"></div>
<div fxLayout>
  <div fxLayout="column"
       fxFlex='100%'
       fxFlex.xs='100%'
       fxFlex.sm='50%'
       fxFlex.md='50%'
       fxFlex.lg='100%'>
    <div style="height:400px; background-color: white; padding:  10px; border-radius: 16px">
      <h4>{{'dashboard.title.revenue-inventory' | translate}}</h4>
      <canvas id="canvas-payback-over-time">{{overViewCharBarLine}}</canvas>
    </div>

  </div>
</div>
<div class="margin-bottom-15"></div>
<div fxLayout style="padding: 10px; background-color: white; border-radius: 16px">
  <div fxLayout="column"
       fxFlex='100%'
       fxFlex.xs='100%'
       fxFlex.sm='50%'
       fxFlex.md='50%'
       fxFlex.lg='100%'
  >
    <h4>Biểu đồ tổng hợp hoàn vốn dự án theo thới gian</h4>
    <cva-table
      [columns]="columns"
      [results]="results"
    >
    </cva-table>
  </div>

</div>

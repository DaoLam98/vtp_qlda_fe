<div class="dialog_wrapper" style="width: 1000px">
  <div class="dialog_header">
    <div class="dialog_title">{{ 'mdm.file-template.type.option.import' | translate }}</div>
    <i class="fal fa-times margin-15" style="cursor: pointer" (click)="matDialogRef.close()"></i>
  </div>
  <div class="dialog_content">
    <form [formGroup]="addEditForm">
      <fieldset>
        <div class="fieldSetContent padding-20" fxLayout="row wrap">
          <app-vss-files-field
            fileTitle="File import"
            formControlName="files"
            [fileAccept]="[FileTypes.XLSX, FileTypes.XLS]"
            fxLayout="column"
            fxFlex="100%"
            [multiple]="false"
            [isDownloadLocal]="true"
            (downloadFiles)="onDownload($event)"
            [fieldPerRow]="2"
          ></app-vss-files-field>
        </div>
      </fieldset>
    </form>
  </div>
  <div class="dialog_footer center">
    <div>
      <button mat-button class="primary outline" (click)="matDialogRef.close()">
        {{ 'common.btnClose' | translate }}
      </button>
      <button mat-button class="primary" [disabled]="addEditForm.invalid" (click)="onSubmit()">
        {{ 'mdm.file-template.type.option.import' | translate }}
      </button>
    </div>
  </div>
</div>

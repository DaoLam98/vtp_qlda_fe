<cva-breadcrumb  style="display: block; margin-bottom: 12px" *ngIf="!isPopup"></cva-breadcrumb>

<div
  class="location-tree"
  fxLayout="row"
  fxLayoutGap="20px"
>
  <cva-flat-tree
    name='organization'
    formControlName='organization'
    [label]=""
    [nodeClicked]="selectedTreeNode"
    [fullDatasource]='locationTree'
    [isCollapseSelected]='false'
    [isSearchOutSide]='false'
    [isDisplayChooseTreeOnly]="true"
    [selectedLabelTitle]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'code')"
    [viewHeight]="undefined"
    [itemSize]="40"
    fxLayout='column'
    style="max-width: 320px; flex: 1; margin-right: 16px !important;"
    [multiple]="false"
    (onNodeClick)="onSelectChange($event)"
  ></cva-flat-tree>

  <cloud-search
    #cloudSearchRef
    fxLayout="column"
    style="flex: 1"
    [configForm]="configForm"
    [isShowBreadcrum]="false"
    [columns]="columns"
    [buttons]="buttons"
    [formAdvanceSearch]="formAdvanceSearch"
    [convertField2HttpParamFn]="convertField2HttpParamFn.bind(this)"
    [addBtnEnabled]="!isPopup && hasAddPermission"
    [selected]="selectedLocation"
  >
    <ng-template appTemplate="filterForm">
      <div
        fxLayout="row wrap"
        class="row-wrap-padding"
        [formGroup]="formAdvanceSearch"
      >
        <cva-input
          name="code"
          formControlName="code"
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'code')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'code')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        ></cva-input>

        <cva-input
          name="name"
          formControlName="name"
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'name')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'name')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        ></cva-input>

        <cva-multi-select-autocomplete
          name='locationLevel'
          formControlName='locationLevel'
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'locationLevel')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'locationLevel')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.select'"
          [multiple]='false'
          [options]='locationLevelValue'
          fxLayout='column'
          fxFlex='25%'
          fxFlex.xs='100%'
          fxFlex.sm='50%'
          fxFlex.md='50%'
          fxFlex.lg='25%'
        ></cva-multi-select-autocomplete>

        <cva-multi-select-autocomplete
          name='status'
          formControlName='status'
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'status')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'status')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.select'"
          [multiple]='false'
          [options]='statusValues$ | async'
          fxLayout='column'
          fxFlex='25%'
          fxFlex.xs='100%'
          fxFlex.sm='50%'
          fxFlex.md='50%'
          fxFlex.lg='25%'
        ></cva-multi-select-autocomplete>
      </div>
    </ng-template>
  </cloud-search>
</div>

<div fxLayout='row wrap' style="justify-content: space-between; align-items: center">
  <cva-breadcrumb style="flex: 1"></cva-breadcrumb>

  <div fxLayout='row wrap' class="vertical-divider">
    <div class='btn-sec' style="display: flex; gap: 11px; margin-left: 33px;">
      <!-- Quay lại -->
      <button mat-button type="submit" class="outline Update-btn" (click)="back()">
        <i class="fas fa-arrow-left"></i> {{ 'btnBack' | translate }}
      </button>

      <!-- Mở kỳ -->
      <button
        *ngIf="isView && hasApprovePermission"
        [disabled]="checkIsActive"
        mat-button
        type="submit"
        class="primary Update-btn"
        (click)="onUpdateStatus('open')"
      >
        <i class="far fa-check-circle"></i> {{ 'mdm.cycle-management.button.open' | translate }}
      </button>

      <!-- Đóng kỳ -->
      <button
        *ngIf="isView && hasRejectPermission"
        [disabled]="!checkIsActive"
        mat-button
        type="submit"
        class="primary Update-btn"
        (click)="onUpdateStatus('close')"
      >
        <i class="fas fa-ban"></i> {{ 'mdm.cycle-management.button.close' | translate }}
      </button>

      <!-- Lưu -->
      <button
        *ngIf="!isView && (hasAddPermission || hasEditPermission)"
        mat-button
        type="submit"
        class="primary Update-btn"
        [disabled]="addEditForm.invalid || isView"
        (click)="onSubmit()"
      >
        <i class="fa fa-save"></i> {{ 'btnAddEdit' | translate }}
      </button>

      <!-- Chỉnh sửa -->
      <button
        *ngIf="isView && hasEditPermission"
        mat-button
        type="submit"
        class="primary Update-btn"
        (click)="onRedirect(this.model?.id)"
      >
        <i class="fas fa-pencil-alt"></i> {{ 'btnUpdate' | translate }}
      </button>
    </div>
  </div>
</div>

<form [formGroup]="addEditForm" class="form edit-form">
  <div class="content" style="padding: 24px 14px">
    <fieldset>
      <legend></legend>
      <div class="fieldSetContent row-wrap-padding" fxLayout="row wrap">
        <cva-input
          name="period"
          formControlName="periodCode"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'period')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [disabled]="true"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        >
        </cva-input>

        <cva-date-picker
          name="startDate"
          formControlName="startDate"
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'startDate')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'startDate')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'DD/MM/YYYY'"
          [disabled]="true"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        >
        </cva-date-picker>

        <cva-date-picker
          name="endDate"
          formControlName="endDate"
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'endDate')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'endDate')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'DD/MM/YYYY'"
          [disabled]="true"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        >
        </cva-date-picker>

        <cva-multi-select-autocomplete
          name="status"
          formControlName="cycleStatus"
          [class]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'status')"
          [label]="Utils.getKeyTrans(configForm?.moduleName, configForm?.name, 'status')"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.select'"
          [options]="statusValues"
          [multiple]="false"
          [disabled]="true"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        ></cva-multi-select-autocomplete>

        @if(isView) {
        <!-- Người tạo -->
        <cva-input
          name="createdBy"
          formControlName="createdBy"
          [label]="'common.table.header.createdBy'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [disabled]="isView"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        >
        </cva-input>

        <!-- Ngày tạo -->
        <cva-date-picker
          name="createdDate"
          formControlName="createdDate"
          [label]="'common.table.header.createdDate'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [disabled]="true"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        ></cva-date-picker>

        <!-- Người cập nhật -->
        <cva-input
          name="lastModifiedBy"
          formControlName="lastModifiedBy"
          [label]="'common.table.header.lastModifiedBy'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [disabled]="isView"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        >
        </cva-input>

        <!-- Ngày cập nhật -->
        <cva-date-picker
          name="lastModifiedDate"
          formControlName="lastModifiedDate"
          [label]="'common.table.header.lastModifiedDate'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [disabled]="true"
          fxLayout="column"
          fxFlex="25%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="25%"
        ></cva-date-picker>
        }
      </div>
    </fieldset>
  </div>
  <div class="margin-top-15"></div>
  <div class="row-wrap">
    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header style="background-color: unset">
        <mat-panel-title> {{ 'mdm.cycle-management.form.project' | translate }} </mat-panel-title>
      </mat-expansion-panel-header>

      <div class="fieldSetContent row-wrap-padding" fxLayout="row wrap">
        <div class="buttonArea" fxLayout fxLayoutAlign="end">
          <button
            *ngIf="!isView && (hasAddPermission || hasEditPermission)"
            mat-button
            type="button"
            class="primary"
            (click)="onAddValue()"
          >
            <i class="fa fa-plus"></i> {{ 'mdm.translation-key.form.add-row' | translate }}
          </button>
        </div>

        <cva-smart-table
          *ngIf="addEditForm.get('cycleManagementProjects')?.value?.length"
          formControlName="cycleManagementProjects"
          [moduleName]="moduleName + '.projects'"
          [columns]="cycleManagementProjectColumns"
          [buttons]="cycleManagementProjectButtons"
          (clickAction)="onTableAction($event)"
          fxFlex="100%"
        ></cva-smart-table>
      </div>
    </mat-expansion-panel>
  </div>
</form>

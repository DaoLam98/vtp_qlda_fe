<div fxLayout='row wrap' style="justify-content: space-between; align-items: center">
  <cva-breadcrumb style="flex: 1"></cva-breadcrumb>
  <div fxLayout="row wrap" class="vertical-divider">
  <div class='btn-sec' style="display: flex; gap: 11px; margin-left: 33px;">
    <!-- Quay lại -->
    <button
      mat-button
      type="submit"
      class="outline Update-btn"
      (click)="back()"
    >
      <i class="fas fa-arrow-left"></i> {{ 'btnBack' | translate }}
    </button>

    <!-- Kích hoạt -->
    <button
      *ngIf="isView && hasApprovePermission"
      [disabled]="checkIsActive"
      mat-button
      type='submit'
      class='primary Update-btn'
      (click)='onUpdateStatus("approve")'
    >
      <i class='far fa-check-circle'></i> {{ 'btnActive'|translate }}
    </button>

    <!-- Hủy kích hoạt -->
    <button
      *ngIf="isView && hasRejectPermission"
      [disabled]="!checkIsActive"
      mat-button type='submit'
      class='primary Update-btn'
      (click)='onUpdateStatus("reject")'
    >
      <i class='fas fa-ban'></i> {{ 'btnInactive'|translate }}
    </button>

    <!-- Lưu -->
    <button
      *ngIf="!isView && (hasAddPermission || hasEditPermission)"
      mat-button
      type='submit'
      class='primary Update-btn'
      [disabled]='addEditForm.invalid'
      (click)='onSubmit()'
    >
      <i class='fa fa-save'></i> {{ 'btnAddEdit'|translate }}
    </button>

    <!-- Chỉnh sửa -->
    <button
      *ngIf="isView && hasEditPermission"
      mat-button
      type='submit'
      class='primary Update-btn'
      (click)='onRedirect(this.model?.id)'
    >
      <i class='fas fa-pencil-alt'></i> {{ 'btnUpdate'|translate }}
    </button>
  </div>
  </div>
</div>

<form [formGroup]="addEditForm" class="form edit-form">
  <div class="content" style="padding: 24px 14px;">
    <fieldset>
      <div
        class="fieldSetContent row-wrap-padding"
        fxLayout="row wrap"
        style="margin-top: 16px"
      >
        <cva-input
          name="accountNumber"
          formControlName="accountNumber"
          [label]="moduleName + '.table.header.accountNumber'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [maxLength]="255"
          [disabled]="isView"
          [required]="!isView"
          fxLayout="column"
          fxFlex="50%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="50%"
        >
        </cva-input>
        <cva-input
          name="name"
          formControlName="name"
          [label]="moduleName + '.table.header.name'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [maxLength]="255"
          [disabled]="isView"
          [required]="!isView"
          fxLayout="column"
          fxFlex="50%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="50%"
        >
        </cva-input>

        <cva-multi-select-autocomplete
          name="parentId"
          formControlName="parentId"
          [label]="moduleName + '.table.header.parentName'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.select'"
          [options]="parentValues"
          [multiple]="false"
          [disabled]="isView"
          fxLayout="column"
          fxFlex="50%"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="50%"
        >
        </cva-multi-select-autocomplete>

        <cva-input
          name="description"
          formControlName="description"
          [label]="moduleName+'.table.header.description'"
          [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
          [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
          [placeholder]="'common.placeholder.input'"
          [disabled]='isView'
          [maxLength]="255"
          fxLayout="column"
          fxFlex.xs="100%"
          fxFlex.sm="50%"
          fxFlex.md="50%"
          fxFlex.lg="50%"
          fxFlex="50%"
        >
        </cva-input>

        @if (isView) {
          <!-- Trạng thái -->
          <cva-input
            name='status'
            formControlName='status'
            [label]="'common.table.header.status'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [disabled]="isView"
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <!-- Người tạo -->
          <cva-input
            name='createdBy'
            formControlName='createdBy'
            [label]="'common.table.header.createdBy'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [disabled]='isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <!-- Ngày tạo -->
          <cva-input
            name='createdDate'
            formControlName='createdDate'
            [label]="'common.table.header.createdDate'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [disabled]='isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <!-- Người cập nhật -->
          <cva-input
            name='lastModifiedBy'
            formControlName='lastModifiedBy'
            [label]="'common.table.header.lastModifiedBy'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [disabled]='isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>

          <!-- Ngày cập nhật -->
          <cva-input
            name='lastModifiedDate'
            formControlName='lastModifiedDate'
            [label]="'common.table.header.lastModifiedDate'"
            [isFloatLabel]="!environment.IS_LABEL_OUTSIDE"
            [isLabelOutside]="environment.IS_LABEL_OUTSIDE"
            [placeholder]="'common.placeholder.input'"
            [disabled]='isView'
            fxLayout='column'
            fxFlex='25%'
            fxFlex.xs='100%'
            fxFlex.sm='50%'
            fxFlex.md='50%'
            fxFlex.lg='25%'
          >
          </cva-input>
        }
      </div>
      <!--           Danh sách đơn vị áp dụng -->
      <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>
            <!-- Tiêu đề -->
            {{ 'mdm.service-group.form.organizations' | translate }}
<!--            ({{ addEditForm.get("orgGlAccounts")?.value?.length || 0 }})-->
          </mat-panel-title>
        </mat-expansion-panel-header>

        <div fxLayout="column">
          <div
            *ngIf="!isView && (hasAddPermission || hasEditPermission)"
            class="buttonArea"
            fxLayout
            fxLayoutAlign="start"
          >
            <!-- Chọn đơn vị áp dụng -->
            <button
              mat-button
              type="button"
              class="primary"
              (click)="onAddOrg()"
            >
              <i class="fa fa-plus"></i> {{ 'mdm.service-group.form.add-row' | translate }}
            </button>
          </div>

          <cva-smart-table
            *ngIf="addEditForm.get('organizations')?.value?.length"
            formControlName="organizations"
            [isSticky]="true"
            [moduleName]="'mdm.organization'"
            [columns]="orgColumns"
            [buttons]="orgButtons"
            (clickAction)="onRowButtonClick($event)"
            fxFlex="100%"
          ></cva-smart-table>
        </div>
      </mat-expansion-panel>
    </fieldset>
  </div>
</form>
